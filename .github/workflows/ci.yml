name: CI Pipeline

on:
  push:
    branches: [ main, Production ]
  pull_request:
    branches: [ main, Production ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install root dependencies
      run: npm ci --no-audit --no-fund
    
    - name: Install functions dependencies
      run: npm ci --no-audit --no-fund
      working-directory: ./functions

    - name: Lint
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Test
      run: npm test -- --run

    - name: Create dummy .env for E2E
      run: |
        cat > .env << 'EOF'
        VITE_FIREBASE_API_KEY=dummy-key
        VITE_FIREBASE_AUTH_DOMAIN=dummy.firebaseapp.com
        VITE_FIREBASE_PROJECT_ID=dummy-project
        VITE_FIREBASE_STORAGE_BUCKET=dummy.appspot.com
        VITE_FIREBASE_MESSAGING_SENDER_ID=000000000000
        VITE_FIREBASE_APP_ID=1:000:web:dummy
        VITE_VENDOR_WHATSAPP=0000000000
        VITE_SENTRY_DSN=https://dummy@sentry.io/0
        VITE_FIREBASE_MEASUREMENT_ID=G-DUMMY
        EOF

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: E2E Test
      run: npm run test:e2e

    - name: Build
      run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/Production'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install Functions Dependencies
        run: npm ci
        working-directory: ./functions
      - name: Deploy to Firebase
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"
