name: CI Pipeline

on:
  push:
    branches: [ main, Production ]
  pull_request:
    branches: [ main, Production ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Install functions dependencies
      run: npm ci
      working-directory: functions

    - name: Lint
      run: npm run lint

    - name: Test
      run: npm test -- --run

    - name: Build
      run: npm run build
